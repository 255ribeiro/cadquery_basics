site_name: Python CadQuery para Arquitetos e Engenheiros
use_directory_urls: false

copyright: Copyright &copy; 2026 Fernando Ferraz Ribeiro

theme:
  features:

    #- navigation.sections
    - toc.integrate
    #- navigation.tabs
  name: material   
  language: en-custom
  custom_dir: docs\overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      #primary: orange
      #accent: deep orange
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: orange
      accent: deep orange
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

  

site_url: "https://255ribeiro.github.io/cadquery_basics/"
repo_url: "https://github.com/255ribeiro/cadquery_basics/"
repo_name: "255ribeiro/cadquery_basics" 

nav:
  - Home: index.md
  - Google Colab: 
    - intro: ./tuto_colab/cadquery_basic_gc.ipynb
    - primitivas: ./tuto_colab/cadquery_primitives_gc.ipynb
    - treliças: ./tuto_colab/cadquery_trusses_gc.ipynb
    - Modelagem: ./tuto_colab/2d_to_3d.ipynb
    - Exercício multi pav: ./tuto_colab/cadquery_multiplos_pav.ipynb
    - Exercício multi pav perfil: ./tuto_colab/cadquery_multiplos_pav.ipynb

  - Vscode:
    - intro: ./tuto_vscode/cadquery_basic_vscode.ipynb
    - primitivas: ./tuto_vscode/cadquery_primitives_vscode.ipynb

  - Downloads: ./down_files/down_files.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - toc:
      toc_depth: 1
extra_css:
  - overrides/css/extra_css.css


plugins:
  - mkdocs-jupyter:
      execute: False
      # include:
      #   - "./docs/tuto_colab/*.ipynb"
      # execute_ignore:
      #   - "./docs/tuto_vscode/*.ipynb"
      include_source: True


